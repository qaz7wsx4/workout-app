
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="訓練課表">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>訓練課表</title>
<style>
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0f0;--text2:#999;--text3:#555;--green:#22c55e;--gdim:rgba(34,197,94,0.12);--amber:#f59e0b;--red:#ef4444;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--tabh:64px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%}
.screen{display:none;flex:1;overflow-y:auto;padding-bottom:calc(var(--tabh) + var(--safe-bottom) + 8px)}
.screen.active{display:block}
.pad{padding:0 16px}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tabh) + var(--safe-bottom));background:rgba(15,15,15,0.92);backdrop-filter:blur(20px);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0}
.tab svg{width:24px;height:24px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.tab span{font-size:10px;color:var(--text3);transition:color 0.2s}
.tab.active svg{stroke:var(--green)}
.tab.active span{color:var(--green)}
.ph{padding:calc(var(--safe-top) + 16px) 16px 12px;position:sticky;top:0;background:rgba(15,15,15,0.9);backdrop-filter:blur(16px);z-index:10;border-bottom:0.5px solid var(--border)}
.ph h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.ph p{font-size:13px;color:var(--text2);margin-top:2px}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.crow{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.crow:active{background:var(--bg3)}
.cdet{padding:12px 16px 14px 56px;display:none;border-top:0.5px solid var(--border)}
.cdet.open{display:block}
.num{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--text2);flex-shrink:0;transition:all 0.2s}
.num.done{background:var(--gdim);border-color:var(--green);color:var(--green)}
.exname{font-size:15px;font-weight:500;color:var(--text);flex:1}
.exsets{font-size:12px;color:var(--text2);margin-top:2px}
.chev{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform 0.2s}
.chev.open{transform:rotate(180deg)}
.tip{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2)}
.btnrow{display:flex;gap:8px}
.rbtn{font-size:13px;padding:8px 14px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer}
.dbtn{flex:1;font-size:13px;padding:8px 14px;border-radius:10px;border:0.5px solid var(--green);background:var(--gdim);color:var(--green);cursor:pointer}
.prog-track{height:3px;background:var(--bg3);border-radius:2px;margin:12px 0 4px}
.prog-fill{height:3px;background:var(--green);border-radius:2px;transition:width 0.4s}
.prog-lbl{font-size:12px;color:var(--text2);margin-bottom:8px}
.slbl{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text3);padding:16px 0 8px}
.pchoice{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.pchoice.sel{border-color:var(--green);background:var(--gdim)}
.wcell{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px 0}
.dc{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 0;border-radius:10px;border:0.5px solid transparent}
.dc.hw{border-color:var(--border);background:var(--bg2)}
.dc.today .dn{background:var(--green);color:#000}
.dc.sel{border-color:var(--green);background:var(--gdim)}
.dname{font-size:10px;color:var(--text3)}
.dn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.ddot{width:4px;height:4px;border-radius:50%;background:var(--amber)}
.scard{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.stime{font-size:22px;font-weight:600;min-width:54px}
.sinfo{flex:1}
.sname{font-size:14px;font-weight:500}
.ssub{font-size:12px;color:var(--text2);margin-top:2px}
.sdel{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end}
.mbg.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bottom) + 20px);width:100%;max-height:85vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:600;margin-bottom:16px}
.modal label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;margin-top:14px}
.modal select,.modal input{width:100%;padding:11px 14px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:15px;appearance:none}
.mact{display:flex;gap:10px;margin-top:20px}
.bcnl{flex:1;padding:13px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:15px;cursor:pointer}
.badd{flex:2;padding:13px;border-radius:12px;border:none;background:var(--green);color:#000;font-size:15px;font-weight:600;cursor:pointer}
.tbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;flex-direction:column}
.tbg.open{display:flex}
.tex{font-size:14px;color:var(--text2);margin-bottom:4px}
.tlbl{font-size:12px;color:var(--text3);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.tring{position:relative;width:200px;height:200px;margin:8px 0}
.tring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{stroke:var(--bg3);fill:none;stroke-width:4}
.ring-fg{stroke:var(--green);fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.tinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.tnum{font-size:88px;font-weight:700;letter-spacing:-4px;line-height:1}
.tnum.urgent{color:var(--red)}
.tact{display:flex;gap:12px;margin-top:20px}
.tskip{padding:12px 28px;border-radius:12px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:15px;cursor:pointer}
.tdone{padding:12px 36px;border-radius:12px;border:none;background:var(--green);color:#000;font-size:15px;font-weight:600;cursor:pointer}
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;margin-bottom:10px;cursor:pointer}
.srow:active{background:var(--bg3)}
.sicon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sicon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stxt{flex:1}
.stitle{font-size:15px}
.ssub2{font-size:12px;color:var(--text2);margin-top:1px;word-break:break-all}
.ubox{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:none}
.ubox.open{display:block}
.ubox input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;margin-bottom:10px}
.usave{width:100%;padding:11px;background:var(--green);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:calc(var(--tabh) + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 24px;color:var(--text3);font-size:14px;line-height:1.7}
.addbtn{width:100%;padding:14px;background:var(--gdim);border:0.5px solid var(--green);border-radius:14px;color:var(--green);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div id="app">
<div class="screen active" id="screen-workout">
  <div class="ph"><h1 id="wtitle">今日課表</h1><p id="wsub">選擇課表開始訓練</p></div>
  <div class="pad">
    <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
    <div class="prog-lbl" id="plbl">0 / 0 動作完成</div>
    <div class="slbl">課表選擇</div>
    <div id="psel"></div>
    <div class="slbl">動作清單</div>
    <div id="exlist"></div>
  </div>
</div>
<div class="screen" id="screen-schedule">
  <div class="ph"><h1>訓練計畫</h1><p id="schmon"></p></div>
  <div class="pad">
    <div class="wcell" id="wcell"></div>
    <div class="slbl" id="daylbl">今天的訓練</div>
    <div id="schlist"></div>
    <button class="addbtn" onclick="openModal()">＋ 新增訓練</button>
  </div>
</div>
<div class="screen" id="screen-settings">
  <div class="ph"><h1>設定</h1><p>課表來源與偏好</p></div>
  <div class="pad">
    <div class="slbl">Google Sheet 課表</div>
    <div class="srow" onclick="toggleU()">
      <div class="sicon" style="background:var(--gdim);color:var(--green)"><svg viewBox="0 0 24 24"><path d="M9 12h6m-3-3v6M3 12a9 9 0 1018 0 9 9 0 00-18 0z"/></svg></div>
      <div class="stxt"><div class="stitle">CSV 連結</div><div class="ssub2" id="csvdisp">尚未設定</div></div>
      <svg width="16" height="16" viewBox="0 0 24 24" style="stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="ubox" id="ubox">
      <input type="text" id="csvinput" placeholder="貼上 Google Sheet CSV 連結...">
      <button class="usave" onclick="saveCSV()">儲存並重新載入課表</button>
    </div>
    <div class="slbl">操作</div>
    <div class="srow" onclick="fetchCSV(true)">
      <div class="sicon" style="background:rgba(245,158,11,0.12);color:var(--amber)"><svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115-3.87M20 15a9 9 0 01-15 3.87"/></svg></div>
      <div class="stxt"><div class="stitle">重新同步課表</div><div class="ssub2">從 Google Sheet 載入最新資料</div></div>
    </div>
    <div class="srow" onclick="resetProg()">
      <div class="sicon" style="background:rgba(239,68,68,0.12);color:var(--red)"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></div>
      <div class="stxt"><div class="stitle">重置今日進度</div><div class="ssub2">清除所有已完成記錄</div></div>
    </div>
    <div class="slbl">安裝到 iPhone</div>
    <div class="card" style="padding:16px"><p style="font-size:13px;color:var(--text2);line-height:1.7">用 iPhone Safari 開啟此網址，點下方<strong style="color:var(--text)">分享</strong>按鈕，選擇<strong style="color:var(--text)">「加入主畫面」</strong>，即可像 App 一樣使用。</p></div>
  </div>
</div>
<nav class="tabbar">
  <div class="tab active" id="tab-workout" onclick="goTab('workout')">
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11m-11 11h11M4 12h16"/><circle cx="6.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="6.5" r="1.5"/><circle cx="6.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg>
    <span>課表</span>
  </div>
  <div class="tab" id="tab-schedule" onclick="goTab('schedule')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span>計畫</span>
  </div>
  <div class="tab" id="tab-settings" onclick="goTab('settings')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    <span>設定</span>
  </div>
</nav>
</div>
<div class="mbg" id="addmodal">
  <div class="modal">
    <h2>新增訓練</h2>
    <label>課表</label><select id="mplan"></select>
    <label>時間</label><input type="time" id="mtime" value="07:00">
    <label>備註（選填）</label><input type="text" id="mnote" placeholder="例：今天重點練背">
    <div class="mact">
      <button class="bcnl" onclick="closeModal()">取消</button>
      <button class="badd" onclick="addSch()">加入計畫</button>
    </div>
  </div>
</div>
<div class="tbg" id="tbg">
  <div class="tex" id="tex"></div>
  <div class="tlbl">組間休息</div>
  <div class="tring">
    <svg viewBox="0 0 200 200" width="200" height="200">
      <circle class="ring-bg" cx="100" cy="100" r="88"/>
      <circle class="ring-fg" id="ringfg" cx="100" cy="100" r="88"/>
    </svg>
    <div class="tinner"><div class="tnum" id="tnum">60</div></div>
  </div>
  <div class="tact">
    <button class="tskip" onclick="stopTimer()">跳過</button>
    <button class="tdone" onclick="stopTimer()">完成休息</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var CIRC=2*Math.PI*88,plans=[],curPlan=0,done={},sch=JSON.parse(localStorage.getItem('sch')||'[]'),csvUrl=localStorage.getItem('csvUrl')||'',selDate=todayKey(),timerInt=null,timerTot=0,timerEnd=0;
// 回到 App 時補回計時差值
document.addEventListener('visibilitychange',function(){
  if(!document.hidden&&timerEnd>0){
    var left=Math.ceil((timerEnd-Date.now())/1000);
    if(left<=0){stopTimer(true);}
    else{
      document.getElementById('tnum').textContent=left;
      document.getElementById('ringfg').style.strokeDashoffset=CIRC*(1-left/timerTot);
      if(left<=5)document.getElementById('tnum').classList.add('urgent');
    }
  }
});
var FALLBACK=[{name:'課表 A：輕鬆 / 恢復',exercises:[
{name:'Bio Force 直臂/肩胛下壓',sets:'3 組 × 12 次',tool:'高位滑輪（極輕重量）',goal:'建構引體向上地基',rest:60,tip:'雙臂完全伸直不彎曲。純粹用「壓低肩膀、收緊腋下」的力量帶動 5~10 公分，啟動下斜方肌。'},
{name:'Bio Force 機械胸推',sets:'3 組 × 12 次',tool:'中位滑輪（25 磅）',goal:'上肢前側推力',rest:90,tip:'推起 2 秒、下放 2 秒。全程不發抖，手腕保持中立。'},
{name:'Bio Force 滑輪下拉',sets:'3 組 × 12 次',tool:'高位滑輪（35 磅）正握',goal:'攀岩拉力基礎',rest:60,tip:'兩秒下拉、兩秒回放。手肘往後口袋塞的感覺帶動闊背肌。'},
{name:'六角啞鈴頭垂直捏持 Pinch',sets:'3 組 × 15~20 秒',tool:'六角啞鈴（5 公斤）',goal:'捏力活化',rest:60,tip:'大拇指與四指極限張開捏住啞鈴頭提離地面，維持 50–60% 力氣。'},
{name:'啞鈴負重捲腹',sets:'3 組 × 15 次',tool:'六角啞鈴（5 公斤）捧胸口',goal:'上腹肌加厚',rest:60,tip:'上背捲離地面即可。下去時背不完全躺平，維持腹肌張力。'},
{name:'飛輪有氧',sets:'20~30 分鐘',tool:'飛輪車（中低阻力）',goal:'心肺維持',rest:null,tip:'維持可以微喘聊天的速度，促進血液循環加速代謝。'}
]}];
function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
  return audioCtx;
}
// 解鎖 AudioContext（iOS 需要在使用者點擊時初始化）
document.addEventListener('touchstart',function(){try{getAudioCtx();}catch(e){}},{once:true});
function beep(){
  try{
    var ctx=getAudioCtx();
    var resume=ctx.state==='suspended'?ctx.resume():Promise.resolve();
    resume.then(function(){
      var o=ctx.createOscillator();
      var g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
      o.start(ctx.currentTime);o.stop(ctx.currentTime+0.15);
    });
  }catch(e){}
}
function init(){
  plans=FALLBACK;
  if(csvUrl){document.getElementById('csvdisp').textContent=csvUrl.length>40?csvUrl.slice(0,40)+'…':csvUrl;document.getElementById('csvinput').value=csvUrl;fetchCSV(false);}
  selectPlan(0);
  renderSchedule();
}
function goTab(name){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='schedule')renderSchedule();
}
function selectPlan(idx){
  curPlan=idx;done={};
  var p=plans[idx];
  document.getElementById('wtitle').textContent=p.name;
  document.getElementById('wsub').textContent=p.exercises.length+' 個動作';
  renderPSel();renderEx();updateProg();
}
function renderPSel(){
  var el=document.getElementById('psel'),msel=document.getElementById('mplan'),html='',mhtml='';
  for(var i=0;i<plans.length;i++){
    var p=plans[i],sel=i===curPlan;
    html+='<div class="pchoice'+(sel?' sel':'')+'" onclick="selectPlan('+i+')">';
    html+='<div style="flex:1"><div style="font-size:14px;font-weight:500">'+p.name+'</div>';
    html+='<div style="font-size:12px;color:var(--text2);margin-top:2px">'+p.exercises.length+' 個動作</div></div>';
    if(sel)html+='<svg width="18" height="18" viewBox="0 0 24 24" style="stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 12l5 5L20 7"/></svg>';
    html+='</div>';
    mhtml+='<option value="'+i+'">'+p.name+'</option>';
  }
  el.innerHTML=html;msel.innerHTML=mhtml;
}
function renderEx(){
  var p=plans[curPlan];if(!p)return;
  var html='';
  for(var i=0;i<p.exercises.length;i++){
    var ex=p.exercises[i],isDone=!!done[i],strike=isDone?'text-decoration:line-through;color:var(--text3)':'';
    html+='<div class="card" id="ec'+i+'">';
    html+='<div class="crow" onclick="togDet('+i+')">';
    html+='<div class="num'+(isDone?' done':'')+'" id="num'+i+'">'+(isDone?'✓':(i+1))+'</div>';
    html+='<div style="flex:1;min-width:0"><div class="exname" style="'+strike+'">'+ex.name+'</div>';
    html+='<div class="exsets">'+ex.sets+(ex.rest?' · 休息 '+ex.rest+'秒':'')+'</div></div>';
    html+='<svg class="chev" id="chev'+i+'" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>';
    html+='<div class="cdet" id="det'+i+'">';
    html+='<div class="pills"><span class="pill">'+ex.goal+'</span><span class="pill">'+ex.tool+'</span></div>';
    html+='<div class="tip">'+ex.tip+'</div><div class="btnrow">';
    if(ex.rest)html+='<button class="rbtn" onclick="startTimer('+ex.rest+','+i+')">⏱ 計時 '+ex.rest+' 秒</button>';
    html+='<button class="dbtn" onclick="markDone('+i+')">'+(isDone?'↩ 取消':'✓ 完成')+'</button>';
    html+='</div></div></div>';
  }
  document.getElementById('exlist').innerHTML=html;
}
function togDet(i){document.getElementById('det'+i).classList.toggle('open');document.getElementById('chev'+i).classList.toggle('open');}
function markDone(i){if(done[i])delete done[i];else done[i]=true;renderEx();updateProg();}
function updateProg(){
  var p=plans[curPlan];if(!p)return;
  var total=p.exercises.length,cnt=Object.keys(done).length,pct=total?Math.round(cnt/total*100):0;
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('plbl').textContent=cnt+' / '+total+' 動作完成';
}
function resetProg(){done={};renderEx();updateProg();toast('進度已重置');}
function requestNotifPerm(){
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }
}
function sendNotif(name){
  if('Notification' in window&&Notification.permission==='granted'){
    try{new Notification('休息結束！',{body:name?'繼續：'+name:'繼續下一組',icon:'icons/icon-192.png',silent:false});}catch(e){}
  }
}
function startTimer(secs,exIdx){
  clearInterval(timerInt);
  timerTot=secs;
  timerEnd=Date.now()+secs*1000;
  requestNotifPerm();
  var ring=document.getElementById('ringfg');
  ring.style.strokeDasharray=CIRC;ring.style.strokeDashoffset=0;
  var p=plans[curPlan],name=p&&p.exercises[exIdx]?p.exercises[exIdx].name:'';
  document.getElementById('tex').textContent=name;
  document.getElementById('tnum').textContent=secs;
  document.getElementById('tnum').classList.remove('urgent');
  document.getElementById('tbg').classList.add('open');
  timerInt=setInterval(function(){
    var left=Math.ceil((timerEnd-Date.now())/1000);
    if(left<0)left=0;
    document.getElementById('tnum').textContent=left;
    ring.style.strokeDashoffset=CIRC*(1-left/timerTot);
    if(left<=5&&left>0){document.getElementById('tnum').classList.add('urgent');beep();}
    if(left<=0){stopTimer(true);sendNotif(name);}
  },500);
}
function stopTimer(auto){
  clearInterval(timerInt);
  timerEnd=0;
  document.getElementById('tbg').classList.remove('open');
}
function renderSchedule(){
  var now=new Date();
  document.getElementById('schmon').textContent=now.getFullYear()+' 年 '+(now.getMonth()+1)+' 月';
  var days=['日','一','二','三','四','五','六'],today=todayKey(),start=new Date(now),html='';
  start.setDate(start.getDate()-start.getDay());
  for(var i=0;i<7;i++){
    var d=new Date(start);d.setDate(start.getDate()+i);
    var key=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    var hasW=sch.some(function(s){return s.date===key;});
    var cls='dc'+(hasW?' hw':'')+(key===today?' today':'')+(key===selDate?' sel':'');
    html+='<div class="'+cls+'" onclick="selDay(\''+key+'\')"><span class="dname">'+days[d.getDay()]+'</span><span class="dn">'+d.getDate()+'</span>'+(hasW?'<span class="ddot"></span>':'<span style="width:4px;height:4px"></span>')+'</div>';
  }
  document.getElementById('wcell').innerHTML=html;
  document.getElementById('daylbl').textContent=selDate===today?'今天的訓練':selDate+' 的訓練';
  var items=sch.filter(function(s){return s.date===selDate;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var lhtml='';
  if(items.length===0){lhtml='<div class="empty">這天還沒有安排訓練<br>點下方按鈕新增</div>';}
  else{for(var j=0;j<items.length;j++){var s=items[j],idx=sch.indexOf(s);lhtml+='<div class="scard"><div class="stime">'+s.time+'</div><div class="sinfo"><div class="sname">'+s.planName+'</div><div class="ssub">'+(s.note||'無備註')+'</div></div><div class="sdel" onclick="delSch('+idx+')"><svg width="14" height="14" viewBox="0 0 24 24" style="stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round"><path d="M18 6L6 18M6 6l12 12"/></svg></div></div>';}}
  document.getElementById('schlist').innerHTML=lhtml;
}
function selDay(key){selDate=key;renderSchedule();}
function openModal(){document.getElementById('addmodal').classList.add('open');document.getElementById('mtime').value='07:00';document.getElementById('mnote').value='';}
function closeModal(){document.getElementById('addmodal').classList.remove('open');}
function addSch(){
  var idx=parseInt(document.getElementById('mplan').value),time=document.getElementById('mtime').value,note=document.getElementById('mnote').value;
  sch.push({date:selDate,time:time,planName:plans[idx].name,planIdx:idx,note:note});
  localStorage.setItem('sch',JSON.stringify(sch));closeModal();renderSchedule();toast('已加入訓練計畫 ✓');
}
function delSch(idx){sch.splice(idx,1);localStorage.setItem('sch',JSON.stringify(sch));renderSchedule();}
function toggleU(){document.getElementById('ubox').classList.toggle('open');}
function saveCSV(){
  var url=document.getElementById('csvinput').value.trim();if(!url)return;
  csvUrl=url;localStorage.setItem('csvUrl',csvUrl);
  document.getElementById('csvdisp').textContent=url.length>40?url.slice(0,40)+'…':url;
  document.getElementById('ubox').classList.remove('open');fetchCSV(true);
}
function fetchCSV(showT){
  if(!csvUrl){toast('請先設定 CSV 連結');return;}
  fetch(csvUrl).then(function(r){return r.text();}).then(function(text){
    var parsed=parseCSV(text);
    if(parsed.length>0){plans=parsed;done={};selectPlan(0);if(showT)toast('課表已更新 ✓');}
    else{if(showT)toast('無法解析課表格式');}
  }).catch(function(){if(showT)toast('連線失敗，使用本機資料');});
}
function parseCSV(text){
  var rows=text.trim().split('\n').map(function(r){return r.split(',').map(function(c){return c.replace(/^"|"$/g,'').trim();});});
  var result=[],cur=null;
  for(var i=0;i<rows.length;i++){
    var row=rows[i];if(!row[0])continue;
    if(row[0].startsWith('課表')){cur={name:row[0],exercises:[]};result.push(cur);}
    else if(row[1]==='針對目標'){continue;}
    else if(cur&&row[3]){cur.exercises.push({name:row[0].replace(/^\d+\.\s*/,''),goal:row[1]||'',tool:row[2]||'',sets:row[3]||'',rest:row[4]?parseInt(row[4]):null,tip:row[5]||''});}
  }
  return result.filter(function(p){return p.exercises.length>0;});
}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
init();
</script>
