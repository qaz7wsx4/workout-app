<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="訓練課表">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>訓練課表</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #555;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --tab-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', sans-serif; overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  .screen { display: none; flex: 1; overflow-y: auto; padding-bottom: calc(var(--tab-h) + var(--safe-bottom) + 8px); }
  .screen.active { display: block; }
  .page-pad { padding: 0 16px; }

  /* ── Tab bar ── */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--tab-h) + var(--safe-bottom));
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--border);
    display: flex; align-items: flex-start; padding-top: 8px;
    z-index: 100;
  }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; }
  .tab svg { width: 24px; height: 24px; stroke: var(--text3); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
  .tab span { font-size: 10px; color: var(--text3); transition: color 0.2s; }
  .tab.active svg { stroke: var(--green); }
  .tab.active span { color: var(--green); }

  /* ── Page headers ── */
  .page-header {
    padding: calc(var(--safe-top) + 16px) 16px 12px;
    position: sticky; top: 0;
    background: rgba(15,15,15,0.9);
    backdrop-filter: blur(16px);
    z-index: 10;
    border-bottom: 0.5px solid var(--border);
  }
  .page-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .page-header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
  .card-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; }
  .card-row:active { background: var(--bg3); }
  .card-detail { padding: 0 16px 14px 56px; display: none; border-top: 0.5px solid var(--border); padding-top: 12px; }
  .card-detail.open { display: block; }

  /* ── Exercise number badge ── */
  .num { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); border: 0.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text2); flex-shrink: 0; transition: all 0.2s; }
  .num.done { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .ex-name { font-size: 15px; font-weight: 500; color: var(--text); flex: 1; }
  .ex-sets { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .chevron { width: 16px; height: 16px; stroke: var(--text3); flex-shrink: 0; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  .detail-tip { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text2); }
  .pill.green { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  .rest-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 8px 14px; border-radius: 10px; border: 0.5px solid var(--border2); background: var(--bg3); color: var(--text); cursor: pointer; }
  .rest-btn:active { opacity: 0.7; }
  .done-btn { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; padding: 8px 14px; border-radius: 10px; border: 0.5px solid var(--green); background: var(--green-dim); color: var(--green); cursor: pointer; margin-left: 8px; }
  .btn-row { display: flex; }

  /* ── Progress bar ── */
  .prog-wrap { padding: 12px 16px 4px; }
  .prog-track { height: 3px; background: var(--bg3); border-radius: 2px; }
  .prog-fill { height: 3px; background: var(--green); border-radius: 2px; transition: width 0.4s; }
  .prog-label { font-size: 12px; color: var(--text2); margin-top: 6px; }

  /* ── Section label ── */
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); padding: 16px 0 8px; }

  /* ── Schedule tab ── */
  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 12px 0; }
  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 8px 0; border-radius: 10px; border: 0.5px solid transparent; }
  .day-cell:active { background: var(--bg3); }
  .day-cell.has-workout { border-color: var(--border); background: var(--bg2); }
  .day-cell.today .day-num { background: var(--green); color: #000; }
  .day-cell.selected { border-color: var(--green); background: var(--green-dim); }
  .day-name { font-size: 10px; color: var(--text3); }
  .day-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--amber); }

  .schedule-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .schedule-card:active { background: var(--bg3); }
  .schedule-time { font-size: 22px; font-weight: 600; color: var(--text); min-width: 54px; }
  .schedule-info { flex: 1; }
  .schedule-name { font-size: 14px; font-weight: 500; }
  .schedule-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .schedule-del { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* ── Add workout modal ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px 20px calc(var(--safe-bottom) + 20px); width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .modal label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; margin-top: 14px; }
  .modal select, .modal input[type=time], .modal input[type=text] {
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 0.5px solid var(--border2); background: var(--bg3);
    color: var(--text); font-size: 15px; appearance: none;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; padding: 13px; border-radius: 12px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 15px; cursor: pointer; }
  .btn-add { flex: 2; padding: 13px; border-radius: 12px; border: none; background: var(--green); color: #000; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* ── Timer overlay ── */
  .timer-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; flex-direction: column; }
  .timer-bg.open { display: flex; }
  .timer-ex { font-size: 14px; color: var(--text2); margin-bottom: 8px; }
  .timer-label { font-size: 13px; color: var(--text2); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .timer-num { font-size: 96px; font-weight: 700; letter-spacing: -4px; color: var(--text); line-height: 1; }
  .timer-num.urgent { color: var(--red); }
  .timer-ring { position: relative; width: 200px; height: 200px; margin: 16px 0; }
  .timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .timer-ring .ring-bg { stroke: var(--bg3); fill: none; stroke-width: 4; }
  .timer-ring .ring-fg { stroke: var(--green); fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .timer-actions { display: flex; gap: 12px; margin-top: 24px; }
  .timer-skip { padding: 12px 28px; border-radius: 12px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 15px; cursor: pointer; }
  .timer-done { padding: 12px 36px; border-radius: 12px; border: none; background: var(--green); color: #000; font-size: 15px; font-weight: 600; cursor: pointer; }

  /* ── Settings tab ── */
  .settings-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; margin-bottom: 10px; cursor: pointer; }
  .settings-row:active { background: var(--bg3); }
  .settings-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .settings-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .settings-text { flex: 1; }
  .settings-title { font-size: 15px; }
  .settings-sub { font-size: 12px; color: var(--text2); margin-top: 1px; word-break: break-all; }
  .settings-arrow { stroke: var(--text3); width: 16px; height: 16px; flex-shrink: 0; }

  .url-input-wrap { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: none; }
  .url-input-wrap.open { display: block; }
  .url-input-wrap input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 13px; margin-bottom: 10px; }
  .url-save-btn { width: 100%; padding: 11px; background: var(--green); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: calc(var(--tab-h) + var(--safe-bottom) + 12px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 10px; padding: 10px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 500; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Loading ── */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">

  <!-- WORKOUT TAB -->
  <div class="screen active" id="screen-workout">
    <div class="page-header">
      <h1 id="workout-title">今日課表</h1>
      <p id="workout-subtitle">選擇課表開始訓練</p>
    </div>
    <div class="page-pad">
      <div class="prog-wrap" style="padding: 12px 0 4px;">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-label" id="prog-label">0 / 0 動作完成</div>
      </div>
      <div class="section-label">課表選擇</div>
      <div id="plan-selector"></div>
      <div class="section-label">動作清單</div>
      <div id="exercise-list"></div>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div class="screen" id="screen-schedule">
    <div class="page-header">
      <h1>訓練計畫</h1>
      <p id="schedule-month"></p>
    </div>
    <div class="page-pad">
      <div class="week-grid" id="week-grid"></div>
      <div class="section-label" id="selected-date-label">本週安排</div>
      <div id="schedule-list"></div>
      <button onclick="openAddModal()" style="width:100%;padding:14px;background:var(--green-dim);border:0.5px solid var(--green);border-radius:14px;color:var(--green);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;">
        + 新增訓練
      </button>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="screen" id="screen-settings">
    <div class="page-header">
      <h1>設定</h1>
      <p>課表來源與偏好</p>
    </div>
    <div class="page-pad">
      <div class="section-label">Google Sheet 課表</div>
      <div class="settings-row" onclick="toggleUrlInput()">
        <div class="settings-icon" style="background:rgba(34,197,94,0.12);color:var(--green)">
          <svg viewBox="0 0 24 24"><path d="M9 12h6m-3-3v6M3 12a9 9 0 1018 0 9 9 0 00-18 0z"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-title">CSV 連結</div>
          <div class="settings-sub" id="csv-url-display">尚未設定</div>
        </div>
        <svg class="settings-arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="url-input-wrap" id="url-input-wrap">
        <input type="text" id="csv-url-input" placeholder="貼上 Google Sheet CSV 連結..." />
        <button class="url-save-btn" onclick="saveAndFetchCSV()">儲存並重新載入課表</button>
      </div>

      <div class="section-label">快速操作</div>
      <div class="settings-row" onclick="fetchCSV(true)">
        <div class="settings-icon" style="background:rgba(245,158,11,0.12);color:var(--amber)">
          <svg viewBox="0 0 24 24"><path d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115-3.87M20 15a9 9 0 01-15 3.87"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-title">重新同步課表</div>
          <div class="settings-sub">從 Google Sheet 重新載入最新資料</div>
        </div>
        <svg class="settings-arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="settings-row" onclick="resetProgress()">
        <div class="settings-icon" style="background:rgba(239,68,68,0.12);color:var(--red)">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-title">重置今日進度</div>
          <div class="settings-sub">清除所有已完成記錄</div>
        </div>
        <svg class="settings-arrow" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
      </div>

      <div class="section-label">安裝說明</div>
      <div class="card" style="padding:16px;">
        <p style="font-size:13px;color:var(--text2);line-height:1.7;">
          在 iPhone Safari 開啟此頁面，點下方<strong style="color:var(--text)">分享</strong>按鈕，選擇<strong style="color:var(--text)">「加入主畫面」</strong>，即可像 App 一樣從桌面開啟。
        </p>
      </div>

      <div style="text-align:center;padding:24px 0 8px;">
        <p style="font-size:11px;color:var(--text3);">版本 1.0 · 資料儲存於本機</p>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <nav class="tabbar">
    <div class="tab active" id="tab-workout" onclick="switchTab('workout')">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5h11m-11 11h11M4 12h16"/><circle cx="6.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="6.5" r="1.5"/><circle cx="6.5" cy="17.5" r="1.5"/><circle cx="17.5" cy="17.5" r="1.5"/></svg>
      <span>課表</span>
    </div>
    <div class="tab" id="tab-schedule" onclick="switchTab('schedule')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>計畫</span>
    </div>
    <div class="tab" id="tab-settings" onclick="switchTab('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>設定</span>
    </div>
  </nav>
</div>

<!-- ADD WORKOUT MODAL -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h2>新增訓練</h2>
    <label>課表</label>
    <select id="modal-plan"></select>
    <label>時間</label>
    <input type="time" id="modal-time" value="07:00">
    <label>備註（選填）</label>
    <input type="text" id="modal-note" placeholder="例：今天重點練背">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-add" onclick="addSchedule()">加入計畫</button>
    </div>
  </div>
</div>

<!-- TIMER OVERLAY -->
<div class="timer-bg" id="timer-bg">
  <div class="timer-ex" id="timer-ex"></div>
  <div class="timer-label">組間休息</div>
  <div class="timer-ring">
    <svg viewBox="0 0 200 200" width="200" height="200">
      <circle class="ring-bg" cx="100" cy="100" r="88"/>
      <circle class="ring-fg" id="ring-fg" cx="100" cy="100" r="88"/>
    </svg>
    <div class="timer-inner">
      <div class="timer-num" id="timer-num">60</div>
    </div>
  </div>
  <div class="timer-actions">
    <button class="timer-skip" onclick="stopTimer()">跳過</button>
    <button class="timer-done" onclick="stopTimer()">完成休息</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
const CIRCUMFERENCE = 2 * Math.PI * 88;
let plans = [];
let currentPlanIdx = 0;
let doneSets = {};
let schedule = JSON.parse(localStorage.getItem('schedule') || '[]');
let csvUrl = localStorage.getItem('csvUrl') || '';
let selectedDate = todayKey();
let timerInterval = null;
let timerTotal = 0;

// ── Fallback data (from uploaded xlsx) ──
const FALLBACK_PLANS = [
  {
    name: "課表 A：輕鬆 / 恢復",
    subtitle: "無單槓版 · 上肢強化",
    exercises: [
      { name: "Bio Force 直臂/肩胛下壓", sets: "3 組 × 12 次", tool: "高位滑輪（極輕重量）", goal: "建構引體向上地基", rest: 60, tip: "雙臂完全伸直不彎曲。純粹用「壓低肩膀、收緊腋下」的力量帶動 5~10 公分，啟動下斜方肌。" },
      { name: "Bio Force 機械胸推", sets: "3 組 × 12 次", tool: "中位滑輪（25 磅）", goal: "上肢前側推力", rest: 90, tip: "推起 2 秒、下放 2 秒。目標全程完全不發抖，手腕保持中立。" },
      { name: "Bio Force 滑輪下拉", sets: "3 組 × 12 次", tool: "高位滑輪（35 磅）正握", goal: "攀岩拉力基礎", rest: 60, tip: "兩秒下拉、兩秒回放。用手肘往後口袋塞的感覺帶動闊背肌。" },
      { name: "六角啞鈴頭垂直捏持 Pinch", sets: "3 組 × 15~20 秒", tool: "六角啞鈴（5 公斤）", goal: "捏力活化", rest: 60, tip: "大拇指與四指極限張開捏住啞鈴頭提離地面。維持 50–60% 力氣即可。" },
      { name: "啞鈴負重捲腹", sets: "3 組 × 15 次", tool: "六角啞鈴（5 公斤）捧胸口", goal: "上腹肌加厚", rest: 60, tip: "上背捲離地面即可。下去時背不完全躺平，維持腹肌張力。" },
      { name: "飛輪有氧", sets: "20~30 分鐘", tool: "飛輪車（中低阻力）", goal: "心肺維持 / 排乳酸", rest: null, tip: "維持可以微喘聊天的速度，促進血液循環加速代謝。" }
    ]
  }
];

// ── Init ──
function init() {
  plans = FALLBACK_PLANS;
  // Apply first plan immediately so UI is never empty
  const p = plans[0];
  document.getElementById('workout-title').textContent = p.name;
  document.getElementById('workout-subtitle').textContent = p.exercises.length + ' 個動作';
  renderWorkout();
  renderSchedule();
  if (csvUrl) {
    document.getElementById('csv-url-display').textContent = csvUrl.length > 40 ? csvUrl.slice(0,40)+'…' : csvUrl;
    document.getElementById('csv-url-input').value = csvUrl;
    fetchCSV(false);
  }
}

// ── CSV fetch ──
function fetchCSV(showToast) {
  if (!csvUrl) { showToastMsg('請先設定 CSV 連結'); return; }
  fetch(csvUrl)
    .then(r => r.text())
    .then(text => {
      const parsed = parseCSV(text);
      if (parsed.length > 0) {
        plans = parsed;
        doneSets = {};
        currentPlanIdx = 0;
        renderWorkout();
        renderPlanSelect();
        if (showToast) showToastMsg('課表已更新 ✓');
      } else {
        if (showToast) showToastMsg('無法解析課表，請確認格式');
      }
    })
    .catch(() => {
      if (showToast) showToastMsg('無法連線，使用本機資料');
    });
}

function parseCSV(text) {
  const rows = text.trim().split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
  const plans = [];
  let currentPlan = null;
  for (const row of rows) {
    if (!row[0]) continue;
    // Detect plan header: first cell has content but no numeric prefix
    if (row[0].startsWith('課表') || (row[1] === undefined || row[1] === '')) {
      if (row[0].includes('課表') || (row[1] === '針對目標' || row[1] === '')) {
        if (row[1] === '針對目標') continue; // header row
        if (row[0].startsWith('課表')) {
          currentPlan = { name: row[0], subtitle: '', exercises: [] };
          plans.push(currentPlan);
          continue;
        }
      }
    }
    if (currentPlan && row[0] && row[3]) {
      currentPlan.exercises.push({
        name: row[0].replace(/^\d+\.\s*/, ''),
        goal: row[1] || '',
        tool: row[2] || '',
        sets: row[3] || '',
        rest: row[4] ? parseInt(row[4]) : null,
        tip: row[5] || ''
      });
    }
  }
  return plans.filter(p => p.exercises.length > 0);
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'schedule') renderSchedule();
}

// ── Workout ──
function renderWorkout() {
  renderPlanSelect();
  renderExercises();
  updateProgress();
}

function renderPlanSelect() {
  const el = document.getElementById('plan-selector');
  el.innerHTML = plans.map((p, i) => `
    <div class="card-row" style="background:${i===currentPlanIdx?'var(--green-dim)':'var(--bg2)'};border:0.5px solid ${i===currentPlanIdx?'var(--green)':'var(--border)'};border-radius:14px;margin-bottom:8px;" onclick="selectPlan(${i})">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">${p.exercises.length} 個動作</div>
      </div>
      ${i===currentPlanIdx ? '<svg width="18" height="18" viewBox="0 0 24 24" style="stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M5 12l5 5L20 7"/></svg>' : ''}
    </div>
  `).join('');

  const modalSel = document.getElementById('modal-plan');
  modalSel.innerHTML = plans.map((p,i) => `<option value="${i}">${p.name}</option>`).join('');
}

function selectPlan(idx) {
  currentPlanIdx = idx;
  doneSets = {};
  const p = plans[idx];
  document.getElementById('workout-title').textContent = p.name;
  document.getElementById('workout-subtitle').textContent = p.exercises.length + ' 個動作';
  renderPlanSelect();
  renderExercises();
  updateProgress();
}

function renderExercises() {
  const plan = plans[currentPlanIdx];
  if (!plan) return;
  const el = document.getElementById('exercise-list');
  el.innerHTML = plan.exercises.map((ex, i) => {
    const isDone = !!doneSets[i];
    return `
    <div class="card ${isDone?'done-card':''}" id="ex-${i}">
      <div class="card-row" onclick="toggleDetail(${i})">
        <div class="num ${isDone?'done'}" id="num-${i}">${isDone ? '✓' : i+1}</div>
        <div style="flex:1;min-width:0;">
          <div class="ex-name" style="${isDone?'text-decoration:line-through;color:var(--text3)':''}">${ex.name}</div>
          <div class="ex-sets">${ex.sets}${ex.rest ? ' · 休息 '+ex.rest+'秒' : ''}</div>
        </div>
        <svg class="chevron" id="chev-${i}" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="card-detail" id="detail-${i}">
        <div class="detail-meta">
          <span class="pill">${ex.goal}</span>
          <span class="pill">${ex.tool}</span>
        </div>
        <div class="detail-tip">${ex.tip}</div>
        <div class="btn-row">
          ${ex.rest ? `<button class="rest-btn" onclick="startTimer(${ex.rest},'${ex.name.replace(/'/g,'\\'')}')">⏱ 計時 ${ex.rest} 秒</button>` : ''}
          <button class="done-btn" style="flex:1;margin-left:${ex.rest?'8px':'0'}" onclick="markDone(${i})">${isDone ? '↩ 取消' : '✓ 完成'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(i) {
  const d = document.getElementById('detail-' + i);
  const c = document.getElementById('chev-' + i);
  const isOpen = d.classList.toggle('open');
  c.classList.toggle('open', isOpen);
}

function markDone(i) {
  if (doneSets[i]) delete doneSets[i]; else doneSets[i] = true;
  renderExercises();
  updateProgress();
}

function updateProgress() {
  const plan = plans[currentPlanIdx];
  if (!plan) return;
  const total = plan.exercises.length;
  const done = Object.keys(doneSets).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + total + ' 動作完成';
}

function resetProgress() {
  doneSets = {};
  renderExercises();
  updateProgress();
  showToastMsg('進度已重置');
}

// ── Timer ──
function startTimer(secs, name) {
  clearInterval(timerInterval);
  timerTotal = secs;
  let left = secs;
  const ring = document.getElementById('ring-fg');
  ring.style.strokeDasharray = CIRCUMFERENCE;
  document.getElementById('timer-ex').textContent = name;
  document.getElementById('timer-num').textContent = left;
  document.getElementById('timer-num').classList.remove('urgent');
  ring.style.strokeDashoffset = 0;
  document.getElementById('timer-bg').classList.add('open');

  timerInterval = setInterval(() => {
    left--;
    document.getElementById('timer-num').textContent = left;
    const offset = CIRCUMFERENCE * (1 - left / timerTotal);
    ring.style.strokeDashoffset = offset;
    if (left <= 5) document.getElementById('timer-num').classList.add('urgent');
    if (left <= 0) stopTimer();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-bg').classList.remove('open');
}

// ── Schedule ──
function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderSchedule() {
  const now = new Date();
  document.getElementById('schedule-month').textContent = now.getFullYear() + ' 年 ' + (now.getMonth()+1) + ' 月';

  // Week grid: show 14 days
  const grid = document.getElementById('week-grid');
  const days = ['日','一','二','三','四','五','六'];
  const today = todayKey();
  const startDate = new Date(now);
  startDate.setDate(startDate.getDate() - startDate.getDay()); // start of week

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const hasW = schedule.some(s => s.date === key);
    const isToday = key === today;
    const isSel = key === selectedDate;
    html += `<div class="day-cell ${hasW?'has-workout':''} ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDate('${key}')">
      <span class="day-name">${days[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
      ${hasW ? '<span class="day-dot"></span>' : '<span style="width:4px;height:4px;"></span>'}
    </div>`;
  }
  grid.innerHTML = html;

  const label = document.getElementById('selected-date-label');
  label.textContent = selectedDate === today ? '今天的訓練' : selectedDate + ' 的訓練';

  const list = document.getElementById('schedule-list');
  const items = schedule.filter(s => s.date === selectedDate).sort((a,b) => a.time.localeCompare(b.time));
  if (items.length === 0) {
    list.innerHTML = '<div class="empty"><p>這天還沒有安排訓練<br>點下方按鈕新增</p></div>';
  } else {
    list.innerHTML = items.map((s,i) => `
      <div class="schedule-card">
        <div class="schedule-time">${s.time}</div>
        <div class="schedule-info">
          <div class="schedule-name">${s.planName}</div>
          <div class="schedule-sub">${s.note || '無備註'}</div>
        </div>
        <div class="schedule-del" onclick="deleteSchedule(${schedule.indexOf(s)})">
          <svg width="14" height="14" viewBox="0 0 24 24" style="stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
      </div>`).join('');
  }
}

function selectDate(key) {
  selectedDate = key;
  renderSchedule();
}

function openAddModal() {
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('modal-time').value = '07:00';
  document.getElementById('modal-note').value = '';
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function addSchedule() {
  const planIdx = parseInt(document.getElementById('modal-plan').value);
  const time = document.getElementById('modal-time').value;
  const note = document.getElementById('modal-note').value;
  schedule.push({ date: selectedDate, time, planName: plans[planIdx].name, planIdx, note });
  localStorage.setItem('schedule', JSON.stringify(schedule));
  closeAddModal();
  renderSchedule();
  showToastMsg('已加入訓練計畫 ✓');
}

function deleteSchedule(idx) {
  schedule.splice(idx, 1);
  localStorage.setItem('schedule', JSON.stringify(schedule));
  renderSchedule();
}

// ── Settings ──
function toggleUrlInput() {
  document.getElementById('url-input-wrap').classList.toggle('open');
}

function saveAndFetchCSV() {
  const url = document.getElementById('csv-url-input').value.trim();
  if (!url) return;
  csvUrl = url;
  localStorage.setItem('csvUrl', csvUrl);
  document.getElementById('csv-url-display').textContent = url.length > 40 ? url.slice(0,40)+'…' : url;
  document.getElementById('url-input-wrap').classList.remove('open');
  fetchCSV(true);
}

// ── Toast ──
function showToastMsg(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

init();
</script>
